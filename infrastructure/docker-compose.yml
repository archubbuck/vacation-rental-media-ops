version: "3.9"

services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

  web:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-c", "echo Replace with Angular build or serve process"]
    volumes:
      - ../apps/web:/app
    restart: unless-stopped

  api:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-c", "echo Replace with NestJS start command"]
    env_file:
      - ../.env.example
    volumes:
      - ../apps/api:/app
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped

  worker:
    image: node:22-alpine
    working_dir: /app
    command: ["sh", "-c", "echo Replace with workflow worker process"]
    env_file:
      - ../.env.example
    volumes:
      - ../apps/api:/app
    depends_on:
      - api
      - redis
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: vr_ops
      POSTGRES_USER: vr_ops
      POSTGRES_PASSWORD: change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: change_me
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  minio_data:
